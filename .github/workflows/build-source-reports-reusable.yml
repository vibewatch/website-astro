name: Build source reports (reusable)

on:
  workflow_call:
    inputs:
      source_key:
        description: Lowercase source directory name under data/, reports/, and docs/.
        required: true
        type: string
      source_label:
        description: Human-readable source name for prompts, step names, and commits.
        required: true
        type: string
      model:
        description: Copilot model to use for report generation.
        required: false
        default: gpt-5.4
        type: string
    secrets:
      HARVESTER_PAT:
        required: true
      COPILOT_PAT:
        required: true
      WEBSITE_PAT:
        required: true

permissions:
  contents: read

env:
  HARVESTER_REPO: vibewatch/harvester

jobs:
  build-source-reports:
    name: Build ${{ inputs.source_label }} reports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout harvester
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HARVESTER_REPO }}
          token: ${{ secrets.HARVESTER_PAT }}
          path: harvester

      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Select model effort
        id: copilot-model
        env:
          COPILOT_MODEL: ${{ inputs.model || 'gpt-5.4' }}
        run: |
          case "$COPILOT_MODEL" in
            claude-opus-4.6|claude-sonnet-4.6)
              COPILOT_EFFORT=high
              ;;
            gpt-5.4|gpt-5.5)
              COPILOT_EFFORT=xhigh
              ;;
            *)
              echo "::error::Unsupported Copilot model: $COPILOT_MODEL"
              exit 1
              ;;
          esac
          echo "model=$COPILOT_MODEL" >> "$GITHUB_OUTPUT"
          echo "effort=$COPILOT_EFFORT" >> "$GITHUB_OUTPUT"

      - name: Generate reports
        working-directory: harvester
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          copilot -p "Generate English markdown trend reports for all ${{ inputs.source_label }} JSON files in data/${{ inputs.source_key }}/ that are dated before today and missing counterparts in reports/${{ inputs.source_key }}/. Run independent report generations concurrently where practical, and wait until every corresponding English .md report file has been generated before exiting. Do NOT run git add or git commit." --model "${{ steps.copilot-model.outputs.model }}" --effort "${{ steps.copilot-model.outputs.effort }}" --yolo --autopilot

      - name: Detect new reports
        id: check-reports
        working-directory: harvester
        run: |
          # Detect uncommitted English .md files (normal case)
          UNSTAGED=$(git status --porcelain "reports/${{ inputs.source_key }}/" | grep '\.md$' | grep -v '\.zh\.md$' || true)
          # Detect English .md files already committed by Copilot CLI (fallback)
          COMMITTED=$(git log origin/main..HEAD --name-only --diff-filter=A 2>/dev/null | grep '^reports/${{ inputs.source_key }}/.*\.md$' | grep -v '\.zh\.md$' || true)
          if [ -n "$UNSTAGED" ] || [ -n "$COMMITTED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push reports to harvester
        if: steps.check-reports.outputs.has_changes == 'true'
        working-directory: harvester
        run: |
          push_with_rebase_retry() {
            for attempt in 1 2 3 4 5; do
              git fetch origin main
              git rebase origin/main
              if git push origin HEAD:main; then
                return 0
              fi
              echo "Push failed on attempt ${attempt}; retrying after rebasing latest origin/main..."
            done
            echo "Unable to push after 5 attempts."
            return 1
          }

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find "reports/${{ inputs.source_key }}" -type f -name '*.md' ! -name '*.zh.md' -print0 | xargs -0 -r git add
          if git diff --cached --quiet; then
            echo "No staged reports to commit; changes may already be committed."
          else
            git commit -m "Add ${{ inputs.source_label }} reports for $(date -u +%Y-%m-%d)"
          fi
          push_with_rebase_retry

      - name: Checkout website
        if: steps.check-reports.outputs.has_changes == 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.WEBSITE_PAT }}
          path: website

      - name: Copy reports to website
        if: steps.check-reports.outputs.has_changes == 'true'
        run: |
          rsync -av --include='*/' --exclude='*.zh.md' --include='*.md' --exclude='*' "harvester/reports/${{ inputs.source_key }}/" "website/docs/${{ inputs.source_key }}/"

      - name: Push docs to website
        if: steps.check-reports.outputs.has_changes == 'true'
        working-directory: website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find "docs/${{ inputs.source_key }}" -type f -name '*.md' ! -name '*.zh.md' -print0 | xargs -0 -r git add
          if git diff --cached --quiet; then
            echo "No new docs to push"
          else
            git commit -m "Update ${{ inputs.source_label }} reports for $(date -u +%Y-%m-%d)"
            push_with_rebase_retry() {
              for attempt in 1 2 3 4 5; do
                git fetch origin main
                git rebase origin/main
                if git push origin HEAD:main; then
                  return 0
                fi
                echo "Push failed on attempt ${attempt}; retrying after rebasing latest origin/main..."
              done
              echo "Unable to push after 5 attempts."
              return 1
            }

            push_with_rebase_retry
          fi